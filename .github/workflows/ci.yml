name: CI

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master ]

jobs:
  # ── Job 1: Host-side unit tests ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (host)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get install -y gcc make

      - name: Build & run unit tests
        working-directory: firmware/test
        run: make

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-binaries
          path: firmware/test/test_*
          retention-days: 7

  # ── Job 2: Static analysis ──────────────────────────────────────────────────
  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck on firmware sources
        run: |
          cppcheck \
            --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            --suppress=unusedFunction \
            --suppress=unusedStructMember \
            --error-exitcode=1 \
            --std=c11 \
            -I firmware/components/modem \
            -I firmware/components/gnss \
            -I firmware/components/relay \
            -I firmware/components/power \
            -I firmware/components/mqtt_wrapper \
            firmware/components/gnss/gnss.c \
            firmware/components/relay/relay.c \
            firmware/components/power/power_monitor.c \
            firmware/test/test_gnss.c \
            firmware/test/test_power.c \
            firmware/test/test_relay.c \
            firmware/test/test_mqtt_json.c \
            2>&1

  # ── Job 3: ESP-IDF build ─────────────────────────────────────────────────────
  esp-idf-build:
    name: ESP-IDF Build (esp32)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create stub credentials.h
        run: |
          cat > firmware/config/credentials.h << 'EOF'
          #pragma once
          #define CONFIG_VEHICLE_ID   "ci-test"
          #define CONFIG_SIM_APN      "internet"
          #define CONFIG_SIM_USER     ""
          #define CONFIG_SIM_PASS     ""
          #define CONFIG_MQTT_HOST    "ci.hivemq.cloud"
          #define CONFIG_MQTT_PORT    8883
          #define CONFIG_MQTT_USER    "ci"
          #define CONFIG_MQTT_PASS    "ci"
          #define CONFIG_MQTT_CA_CERT  NULL
          #define CONFIG_GNSS_PUBLISH_INTERVAL_S  10
          #define CONFIG_STATE_PUBLISH_INTERVAL_S 60
          #define CONFIG_POWER_PUBLISH_INTERVAL_S 30
          EOF

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2
          target: esp32
          path: firmware
