# Home Assistant Automations for Car LTE GPS Tracker
#
# Add these to your automations.yaml, or import via the HA UI
# (Settings → Automations → Import from YAML).
#
# Replace "YOUR_NOTIFY_SERVICE" with your actual notification service,
# e.g. notify.mobile_app_your_phone

# ── 1. Tracker offline alert ──────────────────────────────────────────────────
# Fires when the tracker stops sending heartbeats (LTE lost, power loss, etc.)
- id: tracker_offline_alert
  alias: "Car Tracker — Offline Alert"
  description: >
    Sends a notification when the tracker goes offline
    (no MQTT heartbeat received for 5 minutes).
  trigger:
    - platform: state
      entity_id: sensor.xsara_status
      to: "offline"
      for:
        minutes: 1
    - platform: template
      value_template: >
        {{ (now() - states.sensor.xsara_status.last_updated).total_seconds() > 300 }}
  condition: []
  action:
    - service: YOUR_NOTIFY_SERVICE
      data:
        title: "🚗 Car Tracker Offline"
        message: >
          The tracker has not been heard from for more than 5 minutes.
          Last seen: {{ states.sensor.xsara_status.last_updated | relative_time }}.
  mode: single

# ── 2. Tracker back online ────────────────────────────────────────────────────
- id: tracker_back_online
  alias: "Car Tracker — Back Online"
  description: Notifies when the tracker reconnects after being offline.
  trigger:
    - platform: state
      entity_id: sensor.xsara_status
      to: "online"
  condition:
    - condition: template
      value_template: >
        {{ trigger.from_state.state != 'online'
           and trigger.from_state.state != 'unknown' }}
  action:
    - service: YOUR_NOTIFY_SERVICE
      data:
        title: "✅ Car Tracker Online"
        message: "The tracker is back online."
  mode: single

# ── 3. Low battery warning ────────────────────────────────────────────────────
- id: tracker_low_battery
  alias: "Car Tracker — Low Battery"
  description: >
    Sends a warning when backup battery drops below 20%.
    Only fires when power source is 'battery' (not on car power).
  trigger:
    - platform: numeric_state
      entity_id: sensor.xsara_battery_percent
      below: 20
  condition:
    - condition: state
      entity_id: sensor.xsara_power_source
      state: "battery"
  action:
    - service: YOUR_NOTIFY_SERVICE
      data:
        title: "🔋 Tracker Battery Low"
        message: >
          Backup battery is at {{ states('sensor.xsara_battery_percent') }}%
          ({{ states('sensor.xsara_battery_voltage') }} mV).
          The tracker is running on battery power only.
  mode: single

# ── 4. Critical battery — auto-shutdown warning ───────────────────────────────
- id: tracker_critical_battery
  alias: "Car Tracker — Critical Battery"
  description: >
    Critical warning when backup battery drops below 5%.
    At this level the tracker may shut down soon.
  trigger:
    - platform: numeric_state
      entity_id: sensor.xsara_battery_percent
      below: 5
  condition:
    - condition: state
      entity_id: sensor.xsara_power_source
      state: "battery"
  action:
    - service: YOUR_NOTIFY_SERVICE
      data:
        title: "⚠️ Tracker Battery Critical"
        message: >
          Backup battery is critically low at
          {{ states('sensor.xsara_battery_percent') }}%.
          Tracker may go offline soon.
  mode: single

# ── 5. Relay state change confirmation ───────────────────────────────────────
- id: tracker_relay_changed
  alias: "Car Tracker — Relay State Changed"
  description: >
    Logs and notifies whenever the fuel pump relay changes state.
    Useful for audit trail of remote commands.
  trigger:
    - platform: state
      entity_id: switch.xsara_fuel_pump
  condition:
    - condition: template
      value_template: >
        {{ trigger.from_state.state != trigger.to_state.state
           and trigger.from_state.state not in ('unknown', 'unavailable') }}
  action:
    - service: YOUR_NOTIFY_SERVICE
      data:
        title: "🔑 Fuel Pump Relay Changed"
        message: >
          Fuel pump relay changed:
          {{ trigger.from_state.state | upper }} →
          {{ trigger.to_state.state | upper }}.
    - service: logbook.log
      data:
        name: "Car Tracker"
        message: >
          Relay {{ trigger.to_state.state | upper }}
          (was {{ trigger.from_state.state | upper }})
        entity_id: switch.xsara_fuel_pump
  mode: queued
  max: 5

# ── 6. Car power restored ─────────────────────────────────────────────────────
- id: tracker_car_power_restored
  alias: "Car Tracker — Car Power Restored"
  description: >
    Notifies when car 12V power is restored after running on battery.
  trigger:
    - platform: state
      entity_id: sensor.xsara_power_source
      from: "battery"
      to: "car"
  action:
    - service: YOUR_NOTIFY_SERVICE
      data:
        title: "🔌 Car Power Restored"
        message: "Tracker switched back to car power."
  mode: single
