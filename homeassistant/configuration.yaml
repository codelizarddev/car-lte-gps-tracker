# Home Assistant configuration for Car LTE GPS Tracker
# Add the relevant sections to your configuration.yaml
# Replace `my-car` with the same CONFIG_VEHICLE_ID used in firmware/config/credentials.h

# ─── MQTT Device Tracker ────────────────────────────────────────────────────
device_tracker:
  - platform: mqtt_json
    devices:
      car_tracker: "car/my-car/location"

# ─── MQTT Sensors ───────────────────────────────────────────────────────────
mqtt:
  sensor:
    - name: "Tracker Battery Voltage"
      unique_id: tracker_battery_mv
      state_topic: "car/my-car/power"
      value_template: "{{ value_json.battery_mv }}"
      unit_of_measurement: "mV"
      device_class: voltage

    - name: "Tracker Battery Percent"
      unique_id: tracker_battery_pct
      state_topic: "car/my-car/power"
      value_template: "{{ value_json.battery_pct }}"
      unit_of_measurement: "%"
      device_class: battery

    - name: "Tracker Power Source"
      unique_id: tracker_power_source
      state_topic: "car/my-car/power"
      value_template: "{{ value_json.source }}"

    - name: "Tracker Speed"
      unique_id: tracker_speed
      state_topic: "car/my-car/location"
      value_template: "{{ value_json.speed }}"
      unit_of_measurement: "km/h"
      device_class: speed

    - name: "Tracker GPS Satellites"
      unique_id: tracker_satellites
      state_topic: "car/my-car/location"
      value_template: "{{ value_json.satellites }}"
      unit_of_measurement: "sat"

    - name: "Tracker Status"
      unique_id: tracker_status
      state_topic: "car/my-car/state"
      value_template: "{{ value_json.status }}"
      force_update: true

  # ─── Relay Switch ──────────────────────────────────────────────────────────
  switch:
    - name: "Tracker Fuel Pump"
      unique_id: tracker_fuel_pump
      state_topic: "car/my-car/cmd/relay/status"
      command_topic: "car/my-car/cmd/relay"
      payload_on: "ON"
      payload_off: "OFF"
      state_on: "ON"
      state_off: "OFF"
      optimistic: false
      retain: true
      icon: mdi:gas-station
