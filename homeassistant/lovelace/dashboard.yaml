# Lovelace dashboard for Car LTE GPS Tracker
# Add as a manual card or paste into your dashboard YAML view.

type: vertical-stack
cards:

  # ── Map ───────────────────────────────────────────────────────────────────
  - type: map
    title: Car Location
    entities:
      - device_tracker.xsara_picasso
    hours_to_show: 2
    aspect_ratio: "16:9"
    default_zoom: 15

  # ── Status row ────────────────────────────────────────────────────────────
  - type: glance
    title: Tracker Status
    show_state: true
    entities:
      - entity: sensor.xsara_status
        name: Status
        icon: mdi:car-connected
      - entity: sensor.xsara_speed
        name: Speed
        icon: mdi:speedometer
      - entity: sensor.xsara_gps_satellites
        name: Satellites
        icon: mdi:satellite-variant
      - entity: sensor.xsara_power_source
        name: Power
        icon: mdi:power-plug

  # ── Battery card ──────────────────────────────────────────────────────────
  - type: entities
    title: Battery
    entities:
      - type: custom:mushroom-entity-card
        entity: sensor.xsara_battery_percent
        name: Backup Battery
        icon: mdi:battery
      - entity: sensor.xsara_battery_voltage
        name: Voltage (mV)
        icon: mdi:flash

  # ── Relay control ─────────────────────────────────────────────────────────
  - type: entities
    title: Remote Control
    entities:
      - entity: switch.xsara_fuel_pump
        name: Fuel Pump
        icon: mdi:gas-station
        secondary_info: last-changed

  # ── Confirm dialog button (prevents accidental OFF) ───────────────────────
  - type: button
    name: "⚠ Disable Fuel Pump"
    icon: mdi:car-off
    tap_action:
      action: call-service
      service: switch.turn_off
      target:
        entity_id: switch.xsara_fuel_pump
      confirmation:
        text: >
          This will cut fuel to the engine.
          Are you sure?
    show_state: false
    hold_action:
      action: more-info

  # ── History graph ─────────────────────────────────────────────────────────
  - type: history-graph
    title: Battery (last 24h)
    hours_to_show: 24
    entities:
      - entity: sensor.xsara_battery_percent
        name: Battery %
